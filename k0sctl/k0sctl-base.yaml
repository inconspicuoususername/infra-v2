apiVersion: k0sctl.k0sproject.io/v1beta1
kind: Cluster
metadata:
  name: davud
spec:
  hosts:
    - role: single    
      ssh:
        address: server.something.something
        user: root
        keyPath: ~/.ssh/sshkey123
  k0s:
    # TODO: pin to a current k0s release (https://github.com/k0sproject/k0s/releases)
    version: v1.36.2+k0s
    dynamicConfig: false
    config:
      apiVersion: k0s.k0sproject.io/v1beta1
      kind: ClusterConfig
      metadata:
        name: k0s
      spec:
        network:
          provider: kuberouter        # k0s default CNI — DNS/kube-proxy included
          podCIDR: 10.244.0.0/16
          serviceCIDR: 10.96.0.0/12
        extensions:
          # Storage is Flux's job too: the openebs localpv-provisioner HelmRelease
          # (flux/infrastructure/controllers/openebs.yaml) creates the openebs-hostpath
          # StorageClass. external_storage tells k0s to install NO storage provider, so
          # it can't collide with the Flux-managed one on a future `k0sctl apply`.
          storage:
            type: external_storage
        telemetry:
          enabled: false
