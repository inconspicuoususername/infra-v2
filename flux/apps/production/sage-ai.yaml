---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sage-ai
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-configs
  interval: 30m
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/apps/base/sage-ai
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
