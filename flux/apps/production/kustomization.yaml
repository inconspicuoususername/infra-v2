apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Production apps: one Flux Kustomization per app, so each app can be
# suspended, health-checked and torn down (pruned) independently.
#
# Mothball convention: to take an app down but keep its data, remove its entry
# here — prune deletes the workloads, while namespaces/PVCs annotated with
# `kustomize.toolkit.fluxcd.io/prune: disabled` (and hibernated CNPG clusters)
# survive. Re-adding the entry brings the app back up on the old data.
resources:
  - authentik.yaml
  - perforce.yaml
  - registry.yaml
  - abrabus.yaml
  - aquilla-website.yaml
  - taida-portfolio.yaml
