---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: taida-portfolio
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-configs        # Traefik CRDs + ClusterIssuer
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/apps/base/taida-portfolio
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
