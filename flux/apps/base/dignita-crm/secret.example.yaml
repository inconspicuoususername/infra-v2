# Template for secret.yaml (SOPS-encrypted, git-committed).
# Populate real values, save as secret.yaml, then: sops -e -i secret.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: dignita-crm-secret
  namespace: dignita-crm
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_ME"           # postgresql://myuser:PW@dignita-postgres:5432/mydatabase
  POSTGRES_PASSWORD: "REPLACE_ME"      # must equal the password inside DATABASE_URL
  JWT_SECRET: "REPLACE_ME"
  PASSWORD_SALT: "REPLACE_ME"
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
  AWS_REGION: "REPLACE_ME"
  AWS_BUCKET_NAME: "REPLACE_ME"
