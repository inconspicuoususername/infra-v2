---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: abrabus
  namespace: abrabus
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`abrabus.aquilla.dev`)
      kind: Rule
      services:
        - name: abrabus
          port: 6011
      middlewares:
        - name: security-headers
          namespace: traefik
  tls:
    secretName: abrabus-tls
