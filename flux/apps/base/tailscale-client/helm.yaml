---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: tailscale
  namespace: tailscale
spec:
  interval: 24h
  url: https://tailscale.com
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-client
  namespace: tailscale
spec:
  interval: 1h
  chart:
    spec:
      chart: tailscale-operator
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: tailscale
      interval: 1h
  values:
    envFrom:
      - secretRef:
          name: authentik-secret          # AUTHENTIK_SECRET_KEY, bootstrap creds

    server:
      ingress:
        enabled: false                    # we route via Traefik IngressRoute

    # Bundled Redis is fine (cache/session, not a backup concern).
    redis:
      enabled: true