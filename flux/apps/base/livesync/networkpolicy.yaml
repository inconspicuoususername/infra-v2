---
# CouchDB has no CNPG operator dependency, just its own namespace's cloudflared
# pod. Restrict ingress so no other app namespace can reach it directly.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: couchdb-ingress
  namespace: livesync
spec:
  podSelector:
    matchLabels:
      app: couchdb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
