---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: couchdb
  namespace: livesync
spec:
  replicas: 1
  strategy:
    type: Recreate            # single RWO data/etc PVCs — no two pods at once
  selector:
    matchLabels:
      app: couchdb
  template:
    metadata:
      labels:
        app: couchdb
    spec:
      securityContext:
        runAsUser: 5984        # couchdb user (uid in the official image)
        runAsGroup: 5984
        fsGroup: 5984          # make the mounted PVCs writable by couchdb
      containers:
        - name: couchdb
          image: couchdb:3.5.1   # pinned to match server1's on-disk format
          # No COUCHDB_USER/PASSWORD: the admin (davud), CORS, uuid and auth
          # secret are all carried in the transplanted etc/local.d config.
          ports:
            - name: couchdb
              containerPort: 5984
          volumeMounts:
            - name: data
              mountPath: /opt/couchdb/data
            - name: etc
              mountPath: /opt/couchdb/etc/local.d
          readinessProbe:
            httpGet:
              path: /_up
              port: 5984
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: livesync-data
        - name: etc
          persistentVolumeClaim:
            claimName: livesync-etc
---
apiVersion: v1
kind: Service
metadata:
  name: couchdb-for-ols          # MUST match the cloudflared tunnel's ingress
  namespace: livesync            # target (http://couchdb-for-ols:5984), which
spec:                            # is CF-managed and not editable with our token
  selector:
    app: couchdb
  ports:
    - name: couchdb
      port: 5984
      targetPort: couchdb
