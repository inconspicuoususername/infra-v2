---
apiVersion: v1
kind: Secret
metadata:
  name: livesync-secret
  namespace: livesync
type: Opaque
stringData:
  TUNNEL_TOKEN: "REPLACE_ME"     # cloudflared token for tunnel 18ef4561-…
