# Single-replica registry on a local RWO volume -> Recreate strategy so two
# pods never overlap on the blob store.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      # registry:3 has no dedicated non-root user; run as nobody + fsGroup so
      # the PVC (currently root-owned from running unhardened) becomes
      # writable by the new uid at mount time.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: registry
          image: registry:3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: REGISTRY_AUTH
              value: htpasswd
            - name: REGISTRY_AUTH_HTPASSWD_REALM
              value: Registry Realm
            - name: REGISTRY_AUTH_HTPASSWD_PATH
              value: /auth/registry.password
            - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
              value: /data
          volumeMounts:
            - name: data
              mountPath: /data
            - name: auth
              mountPath: /auth
              readOnly: true
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            # /v2/ answers 401 without creds, so probe the socket instead
            tcpSocket:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
        - name: auth
          secret:
            secretName: registry-auth
        - name: tmp
          emptyDir: {}
