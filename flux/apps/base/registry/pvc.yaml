---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: registry
  annotations:
    # Data outlives the app: this PVC survives a Flux prune/teardown. See the
    # mothball convention in apps/production/kustomization.yaml.
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 30Gi                 # server1 blob store is ~5.2G; headroom
