# htpasswd for the registry — bcrypt ONLY (the registry rejects md5/sha).
# Generate a line with:  docker run --rm httpd:2.4 htpasswd -nbB <user> <pass>
# Copy to secret.yaml and encrypt:  sops -e -i secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: registry-auth
  namespace: registry
stringData:
  registry.password: "user:$2y$05$replace-me"
