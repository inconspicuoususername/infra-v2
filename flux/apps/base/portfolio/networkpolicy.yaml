---
# Same pattern as authentik/networkpolicy.yaml: keep this DB reachable only from
# portfolio's own pods + the CNPG operator, not from every other app namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: portfolio-db-ingress
  namespace: portfolio
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: portfolio-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
