# Template for secret.yaml (which is SOPS-encrypted and git-committed).
# Populate real values, save as secret.yaml, then: sops -e -i secret.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: portfolio-secret
  namespace: portfolio
type: Opaque
stringData:
  NEXTAUTH_SECRET: "REPLACE_ME"          # Auth.js session/JWT signing secret
  GITHUB_CLIENT_SECRET: "REPLACE_ME"     # GitHub OAuth app client secret
  ADMIN_ALLOWLIST: "REPLACE_ME"          # admin email(s) — encrypted (gitleaks)
