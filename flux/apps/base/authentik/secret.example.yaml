# Copy to secret.yaml, fill in, then:  sops --encrypt --in-place secret.yaml
# secret.yaml is the SOPS-encrypted file Flux decrypts; this example stays
# plaintext as documentation and is NOT applied.
---
apiVersion: v1
kind: Secret
metadata:
  name: authentik-secret
  namespace: authentik
type: Opaque
stringData:
  # MUST match the old instance for the migrated DB to stay decryptable.
  # (`openssl rand -base64 60` only for a brand-new install.)
  AUTHENTIK_SECRET_KEY: "REPLACE_ME"
  # SMTP -- was env-only in the old compose, not in the DB, so carry it here.
  AUTHENTIK_EMAIL__HOST: "REPLACE_ME"
  AUTHENTIK_EMAIL__PORT: "587"
  AUTHENTIK_EMAIL__USERNAME: "REPLACE_ME"
  AUTHENTIK_EMAIL__PASSWORD: "REPLACE_ME"
  AUTHENTIK_EMAIL__USE_TLS: "true"
  AUTHENTIK_EMAIL__USE_SSL: "false"
  AUTHENTIK_EMAIL__TIMEOUT: "30"
  AUTHENTIK_EMAIL__FROM: "REPLACE_ME"
  # Fresh install only -- OMIT when migrating (akadmin comes from the restored DB):
  # AUTHENTIK_BOOTSTRAP_PASSWORD: "REPLACE_ME"
  # AUTHENTIK_BOOTSTRAP_TOKEN: "REPLACE_ME"
---
# Borg repo credentials for the DB backup CronJob (backup.yaml). Same SSH key +
# passphrase as the old borgmatic setup (storage box). Duplicated per namespace
# because k8s Secrets can't be read across namespaces.
apiVersion: v1
kind: Secret
metadata:
  name: borg-credentials
  namespace: authentik
type: Opaque
stringData:
  BORG_PASSPHRASE: "REPLACE_ME"            # encrypts the borg repo -- DO NOT LOSE
  BORG_SSH_KEY: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    REPLACE_ME
    -----END OPENSSH PRIVATE KEY-----
