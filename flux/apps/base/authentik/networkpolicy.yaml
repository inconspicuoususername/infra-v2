---
# Restrict ingress to the CNPG postgres pods to same-namespace (authentik's own
# server/worker pods) + cnpg-system (the operator manages/health-checks instances
# directly). Egress is untouched — this only stops *other* app namespaces from
# reaching this DB, which is the actual lateral-movement risk on a flat pod network.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: authentik-db-ingress
  namespace: authentik
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: authentik-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
