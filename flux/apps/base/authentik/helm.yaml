---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 1h
  chart:
    spec:
      chart: authentik
      version: "2026.5.3"
      sourceRef:
        kind: HelmRepository
        name: authentik          # colocated in this folder (authentik namespace)
  values:
    authentik:
      # secret_key + bootstrap creds come from the SOPS secret (env vars below)
      error_reporting:
        enabled: false
      postgresql:
        host: authentik-db-rw           # CNPG read-write service
        name: authentik
        user: authentik
        # password injected via AUTHENTIK_POSTGRESQL__PASSWORD env from CNPG secret
      redis:
        host: authentik-redis-master

    # Pull DB password from the CNPG-generated secret, and the rest from SOPS.
    # Chart 2026.x removed env/envValueFrom/envFrom; the replacement is global.env /
    # global.envFrom (standard k8s env lists, applied to server + worker).
    global:
      env:
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-db-app
              key: password
      envFrom:
        - secretRef:
            name: authentik-secret          # AUTHENTIK_SECRET_KEY, bootstrap creds

    server:
      ingress:
        enabled: false                    # we route via Traefik IngressRoute

    # Bundled Redis is fine (cache/session, not a backup concern).
    redis:
      enabled: true
---
# Chart source for authentik, colocated with the rest of the app. The folder's
# kustomization sets namespace: authentik, so this lives next to everything else
# authentik owns instead of in a shared flux-system file.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 24h
  url: https://charts.goauthentik.io

