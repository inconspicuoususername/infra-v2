apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sage-ai
resources:
  - namespace.yaml
  - pull.secret.yaml     # docker-registry cred for registry.aquilla.dev (SOPS)
  - secret.yaml          # OpenAI/DB/MSSQL/MinIO creds (SOPS)
  - pvc.yaml
  - datastores.yaml      # etcd, minio, milvus-standalone, sqlserver, assistant-db
  - apps.yaml            # alija-data, sage-backend, sage-frontend
