# Template for secret.yaml (SOPS-encrypted, git-committed).
# Populate real values, save as secret.yaml, then: sops -e -i secret.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: sage-secret
  namespace: sage-ai
type: Opaque
stringData:
  OPENAI_API_KEY: "REPLACE_ME"       # shared by sage-backend (OpenAI__ApiKey) + alija-data
  DB_URL: "REPLACE_ME"               # Npgsql conn string -> assistant-db (backend AppDatabase)
  POSTGRES_PASSWORD: "REPLACE_ME"    # assistant-db password (matches DB_URL)
  MSSQL_SA_PASSWORD: "REPLACE_ME"    # demo sqlserver SA
  MINIO_ACCESS_KEY: "REPLACE_ME"     # milvus object store
  MINIO_SECRET_KEY: "REPLACE_ME"
