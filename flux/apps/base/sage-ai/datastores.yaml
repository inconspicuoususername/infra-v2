# Milvus triad (etcd + minio + milvus-standalone) + the two app databases
# (MSSQL demo, postgres assistant-db). Service names match the compose service
# names so the internal URLs resolve (etcd:2379, minio:9000, milvus-standalone,
# sqlserver:1433, assistant-db:5432). All Recreate (single RWO PVC each).
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: etcd, namespace: sage-ai}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: etcd}}
  template:
    metadata: {labels: {app: etcd}}
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.25
          command: ["etcd", "-advertise-client-urls=http://etcd:2379", "-listen-client-urls", "http://0.0.0.0:2379", "--data-dir", "/etcd"]
          env:
            - {name: ETCD_AUTO_COMPACTION_MODE, value: revision}
            - {name: ETCD_AUTO_COMPACTION_RETENTION, value: "1000"}
            - {name: ETCD_QUOTA_BACKEND_BYTES, value: "4294967296"}
            - {name: ETCD_SNAPSHOT_COUNT, value: "50000"}
            - {name: ETCDCTL_API, value: "3"}
          ports: [{containerPort: 2379}]
          volumeMounts: [{name: data, mountPath: /etcd}]
          resources: {limits: {memory: 512Mi}}
      volumes:
        - {name: data, persistentVolumeClaim: {claimName: sage-etcd}}
---
apiVersion: v1
kind: Service
metadata: {name: etcd, namespace: sage-ai}
spec:
  selector: {app: etcd}
  ports: [{name: client, port: 2379, targetPort: 2379}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: minio, namespace: sage-ai}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: minio}}
  template:
    metadata: {labels: {app: minio}}
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-12-18T13-15-44Z
          args: ["server", "/minio_data", "--console-address", ":9001"]
          env:
            - {name: MINIO_ACCESS_KEY, valueFrom: {secretKeyRef: {name: sage-secret, key: MINIO_ACCESS_KEY}}}
            - {name: MINIO_SECRET_KEY, valueFrom: {secretKeyRef: {name: sage-secret, key: MINIO_SECRET_KEY}}}
          ports: [{containerPort: 9000}, {containerPort: 9001}]
          volumeMounts: [{name: data, mountPath: /minio_data}]
          resources: {limits: {memory: 512Mi}}
      volumes:
        - {name: data, persistentVolumeClaim: {claimName: sage-minio}}
---
apiVersion: v1
kind: Service
metadata: {name: minio, namespace: sage-ai}
spec:
  selector: {app: minio}
  ports: [{name: api, port: 9000, targetPort: 9000}, {name: console, port: 9001, targetPort: 9001}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: milvus-standalone, namespace: sage-ai}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: milvus-standalone}}
  template:
    metadata: {labels: {app: milvus-standalone}}
    spec:
      securityContext: {seccompProfile: {type: Unconfined}}
      containers:
        - name: milvus
          image: milvusdb/milvus:v2.6.9
          command: ["milvus", "run", "standalone"]
          env:
            - {name: ETCD_ENDPOINTS, value: "etcd:2379"}
            - {name: MINIO_ADDRESS, value: "minio:9000"}
            - {name: MQ_TYPE, value: rocksmq}
          ports: [{containerPort: 19530}, {containerPort: 9091}]
          volumeMounts: [{name: data, mountPath: /var/lib/milvus}]
          resources: {limits: {memory: 3Gi}}
      volumes:
        - {name: data, persistentVolumeClaim: {claimName: sage-milvus}}
---
apiVersion: v1
kind: Service
metadata: {name: milvus-standalone, namespace: sage-ai}
spec:
  selector: {app: milvus-standalone}
  ports: [{name: grpc, port: 19530, targetPort: 19530}, {name: health, port: 9091, targetPort: 9091}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: sqlserver, namespace: sage-ai}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: sqlserver}}
  template:
    metadata: {labels: {app: sqlserver}}
    spec:
      securityContext: {fsGroup: 10001}
      containers:
        - name: mssql
          image: mcr.microsoft.com/mssql/server:2022-latest
          env:
            - {name: ACCEPT_EULA, value: "Y"}
            - {name: MSSQL_SA_PASSWORD, valueFrom: {secretKeyRef: {name: sage-secret, key: MSSQL_SA_PASSWORD}}}
          ports: [{containerPort: 1433}]
          volumeMounts: [{name: data, mountPath: /var/opt/mssql}]
          resources: {limits: {memory: 3Gi}}
      volumes:
        - {name: data, persistentVolumeClaim: {claimName: sage-mssql}}
---
apiVersion: v1
kind: Service
metadata: {name: sqlserver, namespace: sage-ai}
spec:
  selector: {app: sqlserver}
  ports: [{name: mssql, port: 1433, targetPort: 1433}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: assistant-db, namespace: sage-ai}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: assistant-db}}
  template:
    metadata: {labels: {app: assistant-db}}
    spec:
      containers:
        - name: postgres
          image: postgres:18
          env:
            - {name: POSTGRES_USER, value: postgres}
            - {name: POSTGRES_DB, value: assistant-db}
            - {name: POSTGRES_PASSWORD, valueFrom: {secretKeyRef: {name: sage-secret, key: POSTGRES_PASSWORD}}}
          ports: [{containerPort: 5432}]
          volumeMounts: [{name: data, mountPath: /var/lib/postgresql}]
          resources: {limits: {memory: 512Mi}}
      volumes:
        - {name: data, persistentVolumeClaim: {claimName: sage-pg}}
---
apiVersion: v1
kind: Service
metadata: {name: assistant-db, namespace: sage-ai}
spec:
  selector: {app: assistant-db}
  ports: [{name: pg, port: 5432, targetPort: 5432}]
