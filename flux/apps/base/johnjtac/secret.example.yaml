# Template for secret.yaml (SOPS-encrypted, git-committed). This bundles the
# bot's config + tokens (the whole server1 .env minus DATABASE_URL, which comes
# from CNPG). Populate real values, save as secret.yaml, then: sops -e -i
#
# NOTE: the system prompt is NOT here. It lives in a separate out-of-band Secret
# "johnjtac-sysprompt" that is never committed — see deployment.yaml.
---
apiVersion: v1
kind: Secret
metadata:
  name: johnjtac-secret
  namespace: johnjtac
type: Opaque
stringData:
  DISCORD_TOKEN: "REPLACE_ME"
  DISCORD_CLIENT_ID: "REPLACE_ME"
  XAI_API_KEY: "REPLACE_ME"
  GROK_ADMIN_USER_ID: "REPLACE_ME"
  GROK_MODEL: "REPLACE_ME"
  GROK_INPUT_PRICE_PER_M: "REPLACE_ME"
  GROK_OUTPUT_PRICE_PER_M: "REPLACE_ME"
  LOG_LEVEL: "REPLACE_ME"
