# Copy to secret.yaml, fill in, then:  sops --encrypt --in-place secret.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: perforce-secret
  namespace: perforce
type: Opaque
stringData:
  P4PASSWD: "REPLACE_ME"                   # p4admin password (>= 8 chars, mixed)
---
# Borg repo credentials for the backup CronJob (backup.yaml). Same SSH key +
# passphrase as the old borgmatic setup (storage box).
apiVersion: v1
kind: Secret
metadata:
  name: borg-credentials
  namespace: perforce
type: Opaque
stringData:
  BORG_PASSPHRASE: "REPLACE_ME"            # encrypts the borg repo -- DO NOT LOSE
  BORG_SSH_KEY: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    REPLACE_ME
    -----END OPENSSH PRIVATE KEY-----
