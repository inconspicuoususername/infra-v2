# LE cert for the Perforce endpoint. Traefik terminates TLS on the :1666
# entrypoint with this cert (see ingressroutetcp.yaml) and forwards plain to
# p4d — the nginx-stream-termination setup from server1, done in-cluster.
# HTTP-01 issuance needs perforce.davud.io pointed at the cluster (done).
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: perforce-tls
  namespace: perforce
spec:
  secretName: perforce-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - perforce.davud.io
