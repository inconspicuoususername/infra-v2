# p4d speaks its own protocol (and does its own SSL via P4SSLDIR) on TCP 1666,
# so this is a raw TCP route with TLS passthrough — Traefik does not terminate.
# This is the direct k8s translation of your old traefik dynamic TCP router in
# traefik/configs/dynamic/perforce-davud-io.yml.
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: p4d
  namespace: perforce
spec:
  entryPoints:
    - p4d                       # the custom :1666 entrypoint from the Traefik chart
  routes:
    - match: HostSNI(`*`)       # not SNI-routed; p4d owns the whole entrypoint
      services:
        - name: p4d
          port: 1666
  tls:
    passthrough: true
