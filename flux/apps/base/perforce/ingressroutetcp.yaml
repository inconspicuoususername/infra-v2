# Traefik TERMINATES TLS on the dedicated :1666 entrypoint with the LE cert
# (perforce-tls) and forwards plain TCP to p4d, which runs plain tcp:1666.
# This replaces server1's nginx-stream TLS termination. HostSNI(`*`) matches
# every connection on the entrypoint (p4d owns it), so there's no dependency on
# the client sending SNI — the fragility that broke the old L4 attempt.
# Clients: p4 -p ssl:perforce.davud.io:1666 trust -y  (pins this cert's fingerprint).
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: p4d
  namespace: perforce
spec:
  entryPoints:
    - p4d                       # the custom :1666 entrypoint from the Traefik chart
  routes:
    - match: HostSNI(`*`)       # not SNI-routed; p4d owns the whole entrypoint
      services:
        - name: p4d
          port: 1666
  tls:
    secretName: perforce-tls    # Traefik terminates (passthrough defaults to false)
