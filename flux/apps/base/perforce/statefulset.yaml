# p4d is a single-writer stateful pet. Model it conservatively:
#  - StatefulSet, replicas: 1  -> stable identity + stable PVC, never two pods
#    on the same volume (RollingUpdate on a 1-replica STS terminates the old pod
#    before creating the new one, so there is no overlap).
#  - storage on openebs-hostpath (LOCAL disk). NEVER put db.* on network storage.
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: p4d
  namespace: perforce
spec:
  serviceName: p4d
  replicas: 1
  selector:
    matchLabels:
      app: p4d
  template:
    metadata:
      labels:
        app: p4d
    spec:
      imagePullSecrets:
        - name: registry-pull      # registry.aquilla.dev is htpasswd-auth'd
      containers:
        - name: p4d
          # your existing custom image
          image: registry.aquilla.dev/davud/helix-p4d:0.0.12
          ports:
            - name: p4d
              containerPort: 1666
          env:
            - name: P4USER
              value: p4admin
            - name: P4D_USE_UNICODE
              value: "true"
            # Plain TCP. TLS is terminated at Traefik (see ingressroutetcp.yaml),
            # NOT by p4d. The entrypoint runs its SSL init path iff P4PORT starts
            # with "ssl:", so keep this plain — an "ssl:" value here crashloops
            # the pod (entrypoint's `p4 trust` fails against a non-SSL listener).
            - name: P4PORT
              value: "1666"
          envFrom:
            - secretRef:
                name: perforce-secret        # P4PASSWD
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 1666
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: openebs-hostpath
        resources:
          requests:
            storage: 50Gi                     # TODO: size for your depot
