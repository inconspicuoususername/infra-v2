---
# Shared security-headers middleware, referenced cross-namespace (allowCrossNamespace
# is enabled on the traefik HelmRelease) from every public-facing app's IngressRoute.
# Add `middlewares: [{name: security-headers, namespace: traefik}]` to a route to use it.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: traefik
spec:
  headers:
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    forceSTSHeader: true
    contentTypeNosniff: true
    frameDeny: true
    referrerPolicy: "strict-origin-when-cross-origin"
    permissionsPolicy: "camera=(), microphone=(), geolocation=()"
