---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-configs        # CRDs (CNPG, Traefik, cert-manager) must exist first
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/apps/production
  prune: true
  # Decrypt *.secret.yaml using the age key loaded as flux-system/sops-age
  decryption:
    provider: sops
    secretRef:
      name: sops-age
