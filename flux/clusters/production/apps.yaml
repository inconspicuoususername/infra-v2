---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-configs        # CRDs (CNPG, Traefik, cert-manager) must exist first
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/apps/production
  # TEMPORARILY false: the apps tree just split into per-app Kustomizations and
  # object ownership is migrating from this ks to its children. Flip back to
  # true once every child Kustomization reports Ready.
  prune: false
  # Decrypt *.secret.yaml using the age key loaded as flux-system/sops-age
  decryption:
    provider: sops
    secretRef:
      name: sops-age
